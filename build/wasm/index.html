<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Voyage - Procedural Travel Simulator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            height: 100%;
            overflow: hidden;
            background-color: #0a0a0f;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        #game-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100%;
            width: 100%;
            touch-action: none;
        }
        #loading {
            color: #e0e0e0;
            text-align: center;
            padding: 2em;
        }
        #loading h1 {
            font-size: 2em;
            margin-bottom: 0.5em;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        #loading p {
            color: #888;
            margin-top: 0.5em;
        }
        .loading-spinner {
            margin: 1.5em auto;
            width: 50px;
            height: 50px;
            border: 3px solid #333;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .loading-status {
            font-family: monospace;
            font-size: 0.85em;
            color: #666;
        }
        .error {
            color: #ff6b6b !important;
        }
        canvas {
            display: block;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }
        /* Fullscreen button for mobile */
        #fullscreen-btn {
            position: fixed;
            bottom: 10px;
            right: 10px;
            padding: 8px 16px;
            background: rgba(102, 126, 234, 0.8);
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            z-index: 1000;
            display: none;
        }
        #fullscreen-btn:hover {
            background: rgba(102, 126, 234, 1);
        }
        /* Show fullscreen button on touch devices */
        @media (pointer: coarse) {
            #fullscreen-btn {
                display: block;
            }
        }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="loading">
            <h1>Voyage</h1>
            <p>A 100% Procedural Travel Simulator</p>
            <div class="loading-spinner"></div>
            <p class="loading-status" id="status">Initializing...</p>
        </div>
    </div>
    <button id="fullscreen-btn" onclick="toggleFullscreen()">⛶ Fullscreen</button>
    
    <script src="wasm_exec.js"></script>
    <script>
        const status = document.getElementById("status");
        const loading = document.getElementById("loading");
        
        function updateStatus(msg) {
            status.textContent = msg;
        }
        
        function showError(msg) {
            status.classList.add("error");
            updateStatus("Error: " + msg);
            console.error("Voyage WASM error:", msg);
        }
        
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    console.log("Fullscreen request failed:", err);
                });
            } else {
                document.exitFullscreen();
            }
        }
        
        // Initialize WASM
        async function init() {
            if (!WebAssembly.instantiateStreaming) {
                // Polyfill for Safari
                WebAssembly.instantiateStreaming = async (resp, importObject) => {
                    const source = await (await resp).arrayBuffer();
                    return await WebAssembly.instantiate(source, importObject);
                };
            }
            
            const go = new Go();
            
            updateStatus("Loading game...");
            
            try {
                const response = await fetch("voyage.wasm");
                if (!response.ok) {
                    throw new Error(`Failed to fetch WASM: ${response.status} ${response.statusText}`);
                }
                
                updateStatus("Compiling...");
                const result = await WebAssembly.instantiateStreaming(response, go.importObject);
                
                updateStatus("Starting game...");
                // Hide loading indicator
                loading.style.display = "none";
                
                // Run the Go program
                go.run(result.instance);
            } catch (err) {
                showError(err.message);
            }
        }
        
        // Handle visibility change (pause/resume on tab switch)
        document.addEventListener("visibilitychange", () => {
            // Ebitengine handles this internally, but log for debugging
            console.log("Visibility changed:", document.visibilityState);
        });
        
        // Prevent default touch behaviors that interfere with game
        document.addEventListener("touchmove", (e) => {
            if (e.target.tagName === "CANVAS") {
                e.preventDefault();
            }
        }, { passive: false });
        
        // Start initialization
        init();
    </script>
</body>
</html>
