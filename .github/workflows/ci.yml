name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build
        run: go build -tags headless -v ./...

      - name: Build WASM
        run: GOOS=js GOARCH=wasm go build -o /dev/null ./cmd/voyage

      - name: Test
        run: go test -tags headless -race -v ./...

      - name: Vet
        run: go vet -tags headless ./...

      - name: Validate No Assets
        run: |
          chmod +x ./scripts/validate-no-assets.sh
          ./scripts/validate-no-assets.sh

      - name: Check Test Coverage
        run: |
          go test -tags headless -coverprofile=coverage.out ./...
          go tool cover -func=coverage.out

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v4
        with:
          version: latest
          args: --timeout=5m --build-tags headless
